<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>MiniMart POS</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2316a34a'/><text y='.9em' font-size='75' x='12'>🛒</text></svg>"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#16a34a;--green-dark:#15803d;--green-light:#dcfce7;--green-muted:#bbf7d0;
  --sidebar-bg:#111827;--sidebar-text:#9ca3af;
  --bg:#f1f5f9;--card:#fff;--border:#e2e8f0;--text:#1e293b;--muted:#64748b;
  --red:#ef4444;--amber:#f59e0b;--blue:#3b82f6;--purple:#8b5cf6;
  --radius:8px;--radius-lg:12px;
  --sidebar-w:220px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;font-size:14px}
#app{display:flex;width:100%;height:100vh}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--sidebar-bg);display:flex;flex-direction:column;overflow-y:auto;transition:width .25s,min-width .25s;position:relative;z-index:100}
.sidebar.collapsed{width:56px;min-width:56px}
.sidebar.collapsed .nav-label,.sidebar.collapsed .nav-text,.sidebar.collapsed .nav-badge,.sidebar.collapsed .logo-text,.sidebar.collapsed .logo-sub,.sidebar.collapsed .user-info{display:none}
.sidebar.collapsed .nav-item{justify-content:center;padding:9px 0}
.sidebar.collapsed .sidebar-logo{padding:16px 10px;justify-content:center}
.sidebar.collapsed .sidebar-footer{padding:10px}
.sidebar.collapsed .user-card{justify-content:center}
.sidebar-logo{padding:16px;border-bottom:1px solid #1f2937;display:flex;align-items:center;gap:10px;transition:.25s}
.logo-icon{width:34px;height:34px;min-width:34px;background:var(--green);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;color:#fff}
.logo-text{color:#fff;font-size:15px;font-weight:700;white-space:nowrap}
.logo-sub{color:var(--sidebar-text);font-size:10px;white-space:nowrap}
.sidebar-nav{flex:1;padding:10px 6px}
.nav-label{font-size:10px;font-weight:700;color:#4b5563;text-transform:uppercase;letter-spacing:.8px;padding:4px 8px;margin:8px 0 2px;white-space:nowrap}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:7px;cursor:pointer;color:var(--sidebar-text);font-size:13px;font-weight:500;transition:.15s;position:relative;white-space:nowrap}
.nav-item:hover{background:#1f2937;color:#d1d5db}
.nav-item.active{background:#14532d;color:#86efac}
.nav-item .ti{font-size:17px;min-width:20px;text-align:center}
.nav-badge{margin-left:auto;background:#ef4444;color:#fff;font-size:10px;border-radius:10px;padding:1px 6px;font-weight:700}
.sidebar-footer{padding:10px 12px;border-top:1px solid #1f2937}
.user-card{display:flex;align-items:center;gap:10px}
.user-avatar{width:30px;height:30px;min-width:30px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700}
.user-info p{color:#e5e7eb;font-size:13px;font-weight:600}
.user-info span{color:#6b7280;font-size:11px}
.collapse-btn{position:absolute;top:18px;right:-12px;width:24px;height:24px;background:var(--card);border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:101;box-shadow:0 1px 4px rgba(0,0,0,.15)}
.collapse-btn .ti{font-size:13px;color:var(--muted);transition:transform .25s}
.sidebar.collapsed .collapse-btn .ti{transform:rotate(180deg)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:0 20px;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar h1{font-size:17px;font-weight:700}
.content{flex:1;overflow-y:auto;padding:20px}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:14px;font-weight:700}
.card-subtitle{font-size:11px;color:var(--muted);margin-top:2px}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;display:flex;flex-direction:column;gap:8px}
.stat-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px}
.stat-icon.green{background:#dcfce7;color:#16a34a}
.stat-icon.blue{background:#dbeafe;color:#2563eb}
.stat-icon.amber{background:#fef3c7;color:#d97706}
.stat-icon.purple{background:#ede9fe;color:#7c3aed}
.stat-icon.red{background:#fee2e2;color:#dc2626}
.stat-value{font-size:22px;font-weight:800;line-height:1}
.stat-label{font-size:12px;color:var(--muted);font-weight:500}
.stat-change{font-size:11px;font-weight:600;display:flex;align-items:center;gap:3px}
.stat-change.up{color:#16a34a}.stat-change.down{color:#ef4444}

/* GRIDS */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.grid-65-35{display:grid;grid-template-columns:1.7fr 1fr;gap:14px}

/* TABLES */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:9px 12px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;border-bottom:2px solid var(--border);background:#f8fafc}
td{padding:10px 12px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
tr:hover td{background:#fafafa}
tr:last-child td{border-bottom:none}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700}
.badge-green{background:#dcfce7;color:#15803d}
.badge-red{background:#fee2e2;color:#b91c1c}
.badge-amber{background:#fef3c7;color:#b45309}
.badge-blue{background:#dbeafe;color:#1d4ed8}
.badge-purple{background:#ede9fe;color:#6d28d9}
.badge-gray{background:#f1f5f9;color:#475569}
.badge-mpesa{background:#e6f9ee;color:#006b2e}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:.15s;text-align:center}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--green);color:#fff}.btn-primary:hover{background:var(--green-dark)}
.btn-secondary{background:var(--card);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{background:#f1f5f9}
.btn-danger{background:#ef4444;color:#fff}.btn-danger:hover{background:#dc2626}
.btn-blue{background:#3b82f6;color:#fff}.btn-blue:hover{background:#2563eb}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-icon{padding:6px}
.btn:disabled{opacity:.45;cursor:not-allowed;pointer-events:none}

/* FORMS */
.form-group{margin-bottom:13px}
.form-label{font-size:11px;font-weight:700;color:var(--muted);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.form-control{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:13px;color:var(--text);background:#fff;outline:none;transition:.15s}
.form-control:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(22,163,74,.1)}
select.form-control{cursor:pointer}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--card);border-radius:var(--radius-lg);width:100%;max-width:520px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--card);z-index:1}
.modal-title{font-size:15px;font-weight:700}
.modal-body{padding:20px}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:var(--card)}
.modal-lg{max-width:700px}

/* POS LAYOUT */
.pos-layout{display:grid;grid-template-columns:1fr 360px;height:calc(100vh - 54px);overflow:hidden}
.pos-products{overflow-y:auto;padding:14px;background:var(--bg)}
.pos-cart{background:var(--card);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.cart-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.cart-items{flex:1;overflow-y:auto;padding:8px}
.cart-item{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:var(--radius);border:1px solid var(--border);margin-bottom:6px;background:#fafafa}
.cart-item-name{font-size:12px;font-weight:700;flex:1;line-height:1.3}
.cart-item-price{font-size:12px;color:var(--green);font-weight:700}
.qty-ctrl{display:flex;align-items:center;gap:5px;margin-top:3px}
.qty-btn{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;line-height:1;transition:.1s}
.qty-btn:hover{background:var(--green);color:#fff;border-color:var(--green)}
.qty-val{font-size:13px;font-weight:800;min-width:22px;text-align:center}
.cart-summary{padding:12px 14px;border-top:1px solid var(--border);flex-shrink:0}
.summary-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;color:var(--muted)}
.summary-total{display:flex;justify-content:space-between;font-size:17px;font-weight:800;padding-top:8px;border-top:2px solid var(--border);margin-top:4px}
.pay-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin:8px 0}
.pay-btn{padding:8px 4px;border-radius:var(--radius);border:1.5px solid var(--border);background:#fff;cursor:pointer;text-align:center;font-size:11px;font-weight:700;color:var(--muted);transition:.15s;line-height:1.4}
.pay-btn.active{border-color:var(--green);background:var(--green-light);color:var(--green-dark)}
.pay-btn:hover:not(.active){background:#f8fafc}
.pay-btn .ti{display:block;font-size:19px;margin-bottom:3px}
.pay-input{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:13px;outline:none;transition:.15s;margin-top:6px}
.pay-input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(22,163,74,.1)}

/* PRODUCT GRID */
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.product-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:12px;cursor:pointer;transition:.15s;text-align:center;user-select:none}
.product-card:hover{border-color:var(--green);box-shadow:0 0 0 3px rgba(22,163,74,.08);transform:translateY(-1px)}
.product-card:active{transform:scale(.96)}
.product-emoji{font-size:28px;margin-bottom:6px}
.product-name{font-size:11px;font-weight:700;line-height:1.3;margin-bottom:3px}
.product-price{font-size:13px;font-weight:800;color:var(--green)}
.product-stock{font-size:10px;color:var(--muted)}

/* SEARCH */
.search-bar{position:relative}
.search-bar input{width:100%;padding:9px 12px 9px 34px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:13px;background:#fff;outline:none;transition:.15s}
.search-bar input:focus{border-color:var(--green)}
.search-bar .ti{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px;pointer-events:none}

/* ALERTS */
.alert{padding:10px 14px;border-radius:var(--radius);font-size:13px;display:flex;align-items:flex-start;gap:8px;margin-bottom:12px}
.alert-warning{background:#fef3c7;border:1px solid #fde68a;color:#92400e}
.alert-danger{background:#fee2e2;border:1px solid #fecaca;color:#991b1b}
.alert-success{background:#dcfce7;border:1px solid #bbf7d0;color:#166534}
.alert-info{background:#dbeafe;border:1px solid #bfdbfe;color:#1e40af}

/* PROGRESS */
.progress-bar{height:5px;background:#e2e8f0;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:.4s}

/* CHIPS */
.chip-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.chip{padding:5px 11px;border-radius:20px;border:1px solid var(--border);font-size:11px;font-weight:600;cursor:pointer;background:#fff;color:var(--muted);transition:.15s;user-select:none}
.chip.active{background:var(--green);color:#fff;border-color:var(--green)}
.chip:hover:not(.active){background:#f1f5f9}

/* TABS */
.tabs{display:flex;gap:3px;background:#f1f5f9;border-radius:var(--radius);padding:3px;margin-bottom:16px}
.tab{padding:7px 13px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);transition:.15s;user-select:none}
.tab.active{background:#fff;color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08)}

/* MISC */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:15px;font-weight:700}
.empty-state{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-state .ti{font-size:40px;color:#e2e8f0;display:block;margin-bottom:10px}

/* RECEIPT */
.receipt-paper{background:linear-gradient(180deg,#fff 0%,#f9fafb 100%);border:1px solid #e5e7eb;border-radius:8px;overflow:hidden;font-size:12px;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.receipt-header{background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;padding:16px;text-align:center}
.receipt-header h2{font-size:18px;font-weight:900;letter-spacing:1px}
.receipt-header p{font-size:11px;opacity:.85;margin-top:2px}
.receipt-body{padding:14px;font-family:'Courier New',monospace}
.receipt-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.receipt-divider{border:none;border-top:1px dashed #d1d5db;margin:8px 0}
.receipt-total-row{display:flex;justify-content:space-between;font-size:15px;font-weight:900;color:var(--green);padding:6px 0}
.receipt-item{display:flex;justify-content:space-between;padding:3px 0;font-size:12px}
.receipt-footer{background:linear-gradient(135deg,#f0fdf4,#dcfce7);padding:12px;text-align:center;border-top:1px solid #bbf7d0}
.receipt-footer p{font-size:12px;color:var(--green-dark);font-weight:600}
.receipt-badge{display:inline-block;background:var(--green);color:#fff;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-top:4px}

/* M-PESA */
.mpesa-card{background:linear-gradient(135deg,#00a651 0%,#007a3d 100%);border-radius:var(--radius-lg);padding:14px;color:#fff;margin-top:8px}
.mpesa-logo{font-size:20px;font-weight:900;letter-spacing:2px;font-style:italic}
.mpesa-input{flex:1;padding:9px 12px;border-radius:var(--radius);border:none;font-size:13px;background:rgba(255,255,255,.2);color:#fff;outline:none;width:100%;margin-top:8px}
.mpesa-input::placeholder{color:rgba(255,255,255,.65)}
.mpesa-input:focus{background:rgba(255,255,255,.3)}
.mpesa-btn{width:100%;margin-top:8px;padding:10px;background:#fff;color:#007a3d;border:none;border-radius:var(--radius);font-weight:800;cursor:pointer;font-size:13px;transition:.15s}
.mpesa-btn:hover:not(:disabled){background:#f0fdf4}
.mpesa-btn:disabled{opacity:.6;cursor:not-allowed}
.mpesa-status{font-size:12px;padding:6px 10px;border-radius:var(--radius);background:rgba(255,255,255,.15);margin-top:8px;display:flex;align-items:center;gap:6px}

/* CHANGE DISPLAY */
.change-box{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:2px solid #16a34a;border-radius:var(--radius);padding:10px;text-align:center;margin-top:8px}
.change-box .change-label{font-size:11px;color:var(--green-dark);font-weight:700;text-transform:uppercase}
.change-box .change-amount{font-size:22px;font-weight:900;color:var(--green)}

/* SCANNER */
.scanner-box{background:#000;border-radius:var(--radius-lg);padding:20px;text-align:center;color:#fff;position:relative;overflow:hidden;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}
.scanner-line{width:80%;height:2px;background:linear-gradient(90deg,transparent,#16a34a,transparent);position:absolute;top:50%;animation:scan 2s linear infinite}
@keyframes scan{0%{top:30%}50%{top:70%}100%{top:30%}}
.scanner-corners::before,.scanner-corners::after{content:'';position:absolute;width:30px;height:30px;border-color:#16a34a;border-style:solid}
.scanner-corners::before{top:12px;left:12px;border-width:3px 0 0 3px}
.scanner-corners::after{bottom:12px;right:12px;border-width:0 3px 3px 0}

/* NOTIFICATION */
.notif{position:fixed;top:16px;right:16px;background:#1e293b;color:#fff;padding:11px 16px;border-radius:var(--radius-lg);font-size:13px;z-index:9999;display:flex;align-items:center;gap:8px;box-shadow:0 8px 24px rgba(0,0,0,.2);animation:slideIn .3s ease;max-width:320px}
@keyframes slideIn{from{transform:translateX(110px);opacity:0}to{transform:translateX(0);opacity:1}}

/* LOGIN */
.login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#0f172a 0%,#1a2744 50%,#0f172a 100%);display:flex;align-items:center;justify-content:center;z-index:9998;flex-direction:column}
.login-box{background:#fff;border-radius:16px;padding:36px;width:380px;box-shadow:0 25px 60px rgba(0,0,0,.4)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo .icon{width:64px;height:64px;background:linear-gradient(135deg,#16a34a,#15803d);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 14px;box-shadow:0 8px 20px rgba(22,163,74,.4)}
.pin-dots{display:flex;gap:10px;justify-content:center;margin:16px 0}
.pin-dot{width:14px;height:14px;border-radius:50%;background:#e2e8f0;transition:.2s}
.pin-dot.filled{background:var(--green)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}
.pin-key{padding:14px;background:#f8fafc;border:1.5px solid var(--border);border-radius:var(--radius);text-align:center;font-size:18px;font-weight:700;cursor:pointer;transition:.15s;user-select:none}
.pin-key:hover{background:#f0fdf4;border-color:var(--green);color:var(--green)}
.pin-key:active{transform:scale(.93);background:var(--green-light)}
.pin-key.del{font-size:14px;color:var(--red)}
.pin-key.login-key{background:var(--green);color:#fff;border-color:var(--green);font-size:14px}
.pin-key.login-key:hover{background:var(--green-dark)}

/* SPINNER */
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* ROLE BADGE */
.role-admin{background:#ede9fe;color:#5b21b6}
.role-cashier{background:#dbeafe;color:#1e40af}
.role-manager{background:#dcfce7;color:#14532d}

@media print{
  .sidebar,.topbar,.modal-footer .btn-secondary{display:none!important}
  .receipt-paper{box-shadow:none;border:none}
}
</style>
</head>

function mpesaTS(){const n=new Date();return n.getFullYear()+String(n.getMonth()+1).padStart(2,'0')+String(n.getDate()).padStart(2,'0')+String(n.getHours()).padStart(2,'0')+String(n.getMinutes()).padStart(2,'0')+String(n.getSeconds()).padStart(2,'0');}
async function mpesaSTK(phone,amount,ref){
  let msisdn=phone.replace(/\D/g,'');
  if(msisdn.startsWith('0'))msisdn='254'+msisdn.slice(1);
  if(msisdn.startsWith('+'))msisdn=msisdn.slice(1);
  const tok=await mpesaToken(),ts=mpesaTS();
  const pwd=btoa(MPESA.shortcode+MPESA.passkey+ts);
  const r=await fetch(`${MPESA.base}/mpesa/stkpush/v1/processrequest`,{method:'POST',headers:{'Authorization':'Bearer '+tok,'Content-Type':'application/json'},body:JSON.stringify({BusinessShortCode:MPESA.shortcode,Password:pwd,Timestamp:ts,TransactionType:'CustomerPayBillOnline',Amount:Math.ceil(amount),PartyA:msisdn,PartyB:MPESA.shortcode,PhoneNumber:msisdn,CallBackURL:MPESA.callbackURL,AccountReference:ref||'MiniMartPOS',TransactionDesc:'MiniMart Purchase'})});
  return await r.json();
}
async function mpesaQuery(checkoutId){
  const tok=await mpesaToken(),ts=mpesaTS();
  const pwd=btoa(MPESA.shortcode+MPESA.passkey+ts);
  const r=await fetch(`${MPESA.base}/mpesa/stkpushquery/v1/query`,{method:'POST',headers:{'Authorization':'Bearer '+tok,'Content-Type':'application/json'},body:JSON.stringify({BusinessShortCode:MPESA.shortcode,Password:pwd,Timestamp:ts,CheckoutRequestID:checkoutId})});
  return await r.json();
}

document.addEventListener('keydown',e=>{
  // If focused on input, skip barcode handling
  if(document.activeElement&&['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName))return;
  if(e.key==='Enter'){
    if(S.barcodeBuffer.length>4){handleBarcode(S.barcodeBuffer);}
    S.barcodeBuffer='';
  } else if(e.key.length===1){
    S.barcodeBuffer+=e.key;
    clearTimeout(S.barcodeTimer);
    S.barcodeTimer=setTimeout(()=>{S.barcodeBuffer='';},200);
  }
});
function handleBarcode(code){
  const prod=DB.products.find(p=>p.barcode===code||p.sku===code);
  if(!prod){notif('Product not found: '+code,'warning');return;}
  if(prod.stock<=0){notif(prod.name+' is out of stock','danger');return;}
  addToCart(prod.id);
  notif('Added: '+prod.name,'success');
}

function bindLogin(){
  document.querySelectorAll('[data-seluser]').forEach(el=>el.onclick=()=>{ss({loginUser:parseInt(el.dataset.seluser),loginPin:'',});});
  document.querySelectorAll('[data-pinkey]').forEach(el=>el.onclick=()=>{
    const k=el.dataset.pinkey;
    if(k==='del'){ss({loginPin:S.loginPin.slice(0,-1)});return;}
    if(k==='enter'){doLogin();return;}
    if(S.loginPin.length>=6)return;
    const np=S.loginPin+k;
    const user=DB.users.find(u=>u.id===S.loginUser);
    if(user&&user.pin===np){
      DB.currentUser=user;DB.actLog.unshift({user:user.name,action:'Logged in',time:new Date().toISOString()});
      ss({loginPin:''});
    } else {
      ss({loginPin:np});
      if(np.length>=6){setTimeout(()=>ss({loginPin:''}),500);}
    }
  });
}
function doLogin(){
  const user=DB.users.find(u=>u.id===S.loginUser);
  if(user&&user.pin===S.loginPin){DB.currentUser=user;DB.actLog.unshift({user:user.name,action:'Logged in',time:new Date().toISOString()});ss({loginPin:''});}
  else{ss({loginPin:''});notif('Wrong PIN','danger');}
}

function addToCart(pid){
  const prod=DB.products.find(p=>p.id===pid);
  if(!prod||prod.stock<=0)return;
  const cart=[...S.cart];
  const idx=cart.findIndex(c=>c.productId===pid);
  if(idx>=0){if(cart[idx].qty>=prod.stock){notif('Max stock reached','warning');return;}cart[idx]={...cart[idx],qty:cart[idx].qty+1};}
  else cart.push({productId:pid,name:prod.name,price:prod.sellPrice,cost:prod.buyPrice,qty:1});
  ss({cart});
}
function renderPOS(){
  const cats=[{id:0,name:'All',icon:'🏪'},...DB.categories];

    return p.active&&p.stock>0;

function renderReports(){
  const mo30=new Date();mo30.setDate(mo30.getDate()-30);
  const mS=DB.sales.filter(s=>new Date(s.date)>=mo30);
  const mR=mS.reduce((a,s)=>a+s.total,0);
  const mC=mS.reduce((a,s)=>a+s.items.reduce((b,i)=>b+i.cost*i.qty,0),0);
  const today=new Date().toDateString();
  const tS=DB.sales.filter(s=>new Date(s.date).toDateString()===today);
  const tR=tS.reduce((a,s)=>a+s.total,0);
  const pay={cash:0,mpesa:0,card:0};mS.forEach(s=>{pay[s.paymentMethod]=(pay[s.paymentMethod]||0)+s.total;});
  const last14=[];for(let i=13;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const ds=d.toDateString();last14.push({l:d.toLocaleDateString('en-KE',{day:'2-digit',month:'short'}),v:DB.sales.filter(s=>new Date(s.date).toDateString()===ds).reduce((a,s)=>a+s.total,0)});}
  const maxB=Math.max(...last14.map(d=>d.v))||1;
  const pm={};mS.forEach(s=>s.items.forEach(it=>{if(!pm[it.productId]){pm[it.productId]={name:it.name,qty:0,rev:0,cost:0};}pm[it.productId].qty+=it.qty;pm[it.productId].rev+=it.qty*it.price;pm[it.productId].cost+=it.qty*(it.cost||0);}));
  const topP=Object.values(pm).sort((a,b)=>b.rev-a.rev).slice(0,12);
  return `
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-icon green"><i class="ti ti-currency-dollar"></i></div><div class="stat-value">${fmt(tR)}</div><div class="stat-label">Today Revenue</div></div>
    <div class="stat-card"><div class="stat-icon blue"><i class="ti ti-receipt"></i></div><div class="stat-value">${tS.length}</div><div class="stat-label">Today Transactions</div></div>
    <div class="stat-card"><div class="stat-icon amber"><i class="ti ti-calendar-month"></i></div><div class="stat-value">${fmt(mR)}</div><div class="stat-label">30-Day Revenue</div></div>
    <div class="stat-card"><div class="stat-icon purple"><i class="ti ti-trending-up"></i></div><div class="stat-value">${fmt(mR-mC)}</div><div class="stat-label">30-Day Profit</div></div>
  </div>
  <div class="grid-65-35" style="margin-bottom:14px">
    <div class="card">
      <div class="card-header"><div class="card-title">Daily Revenue — Last 14 Days</div>
        <button class="btn btn-secondary btn-sm" id="exportCSVBtn"><i class="ti ti-download"></i> Export CSV</button></div>
      <div style="display:flex;align-items:flex-end;gap:3px;height:140px;padding:0 4px;overflow:hidden">
        ${last14.map(d=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;min-width:0">
          <div style="width:100%;background:${d.l===new Date().toLocaleDateString('en-KE',{day:'2-digit',month:'short'})?'var(--green)':'#bbf7d0'};border-radius:2px 2px 0 0;height:${Math.max(3,Math.round((d.v/maxB)*120))}px;transition:.4s"></div>
          <div style="font-size:8px;color:var(--muted);transform:rotate(-45deg);transform-origin:top right;white-space:nowrap;margin-top:2px">${d.l}</div>
        </div>`).join('')}
      </div>
    </div>
    <div class="card">
      <div class="card-header"><div class="card-title">Payment Breakdown</div></div>
      ${Object.entries(pay).map(([m,v])=>{const pct=Math.round(v/(mR||1)*100);return`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span style="font-weight:700">${m==='mpesa'?'M-Pesa':m[0].toUpperCase()+m.slice(1)}</span><span>${pct}% · ${fmt(v)}</span></div><div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${m==='mpesa'?'#00a651':m==='card'?'var(--blue)':'var(--amber)'}"></div></div></div>`;}).join('')}
      <div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border)">
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px"><span>Revenue</span><strong>${fmt(mR)}</strong></div>
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px"><span style="color:var(--red)">Cost of Goods</span><strong style="color:var(--red)">${fmt(mC)}</strong></div>
        <div style="display:flex;justify-content:space-between;font-size:14px;font-weight:800;color:var(--green)"><span>Gross Profit</span><span>${fmt(mR-mC)} (${mR>0?Math.round((mR-mC)/mR*100):0}%)</span></div>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-header"><div class="card-title">Product Performance (30 Days)</div></div>
    <div class="table-wrap"><table>
      <thead><tr><th>Product</th><th>Units</th><th>Revenue</th><th>Cost</th><th>Profit</th><th>Margin</th></tr></thead>
      <tbody>${topP.map(p=>{const pr=p.rev-p.cost;const mg=p.rev>0?Math.round(pr/p.rev*100):0;return`<tr>
        <td style="font-weight:700">${p.name}</td><td>${p.qty}</td>
        <td style="font-weight:700">${fmt(p.rev)}</td>
        <td style="color:var(--muted)">${fmt(p.cost)}</td>
        <td style="font-weight:800;color:var(--green)">${fmt(pr)}</td>
        <td><span class="badge badge-${mg>30?'green':mg>15?'amber':'red'}">${mg}%</span></td>
      </tr>`;}).join('')}</tbody>
    </table></div>
  </div>`;
}

function renderModal(){
  const m=S.modal;
  if(m.type==='addProd'||m.type==='editProd')return modalProduct();
  if(m.type==='viewSale')return modalViewSale();
  if(m.type==='receipt')return modalReceipt();
  if(m.type==='addCust')return modalAddCust();

  if(m.type==='adjStock')return modalAdjStock();
  if(m.type==='addSup')return modalAddSup();
  if(m.type==='addEmp')return modalAddEmp();
  if(m.type==='scanProd')return modalScanProduct();
  return '';
}

// ════════════════════════════════════════════════════
//  EVENT BINDING
// ════════════════════════════════════════════════════
let mpesaPollTimer=null;
function bind(){
  // nav & sidebar
  document.querySelectorAll('[data-nav]').forEach(el=>el.onclick=()=>nav(el.dataset.nav));
  document.getElementById('logoutBtn')?.addEventListener('click',()=>{DB.currentUser=null;clearInterval(mpesaPollTimer);render();});
  document.getElementById('quickPos')?.addEventListener('click',()=>nav('pos'));
  document.getElementById('collapseBtn')?.addEventListener('click',()=>{DB.sidebarCollapsed=!DB.sidebarCollapsed;render();});

  // modal close
  document.getElementById('closeM')?.addEventListener('click',closeM);
  document.getElementById('closeM2')?.addEventListener('click',closeM);
  document.getElementById('mOverlay')?.addEventListener('click',e=>{if(e.target.id==='mOverlay')closeM();});

  // search inputs (focused immediately so typing works without clicking)
  const pS=document.getElementById('posSearch');
  if(pS){pS.addEventListener('input',e=>ss({searchTerm:e.target.value}));pS.focus();}
  document.getElementById('txSearch')?.addEventListener('input',e=>ss({searchTerm:e.target.value}));
  document.getElementById('prodSearch')?.addEventListener('input',e=>ss({searchTerm:e.target.value}));
  document.getElementById('custSearch')?.addEventListener('input',e=>ss({custSearch:e.target.value}));

  // POS category chips
  document.querySelectorAll('[data-poscat]').forEach(el=>el.onclick=()=>ss({posCategory:parseInt(el.dataset.poscat)}));

  // Product cat filter
  document.getElementById('prodCatFilt')?.addEventListener('change',e=>ss({prodCatFilter:parseInt(e.target.value)}));

  // Add to cart
  document.querySelectorAll('[data-addprod]').forEach(el=>el.onclick=()=>addToCart(parseInt(el.dataset.addprod)));

  // Cart qty controls
  document.querySelectorAll('[data-qup]').forEach(el=>el.onclick=()=>{
    const idx=parseInt(el.dataset.qup),cart=[...S.cart];
    const prod=DB.products.find(p=>p.id===cart[idx].productId);
    if(cart[idx].qty<(prod?.stock||99)){cart[idx]={...cart[idx],qty:cart[idx].qty+1};ss({cart});}
  });
  document.querySelectorAll('[data-qdn]').forEach(el=>el.onclick=()=>{
    const idx=parseInt(el.dataset.qdn),cart=[...S.cart];
    if(cart[idx].qty>1)cart[idx]={...cart[idx],qty:cart[idx].qty-1};else cart.splice(idx,1);ss({cart});
  });
  document.querySelectorAll('[data-rmv]').forEach(el=>el.onclick=()=>{
    const cart=[...S.cart];cart.splice(parseInt(el.dataset.rmv),1);ss({cart});
  });
  document.getElementById('clearCart')?.addEventListener('click',()=>ss({cart:[],discount:0,selectedCust:null,mpesaStatus:null,cashReceived:''}));

  // Payment method
  document.querySelectorAll('[data-pay]').forEach(el=>el.onclick=()=>ss({payMethod:el.dataset.pay,mpesaStatus:null}));

  // Discount & cash — use oninput so every keystroke updates without re-clicking
  const dI=document.getElementById('discInput');
  if(dI){dI.addEventListener('input',e=>ss({discount:parseFloat(e.target.value)||0}));dI.addEventListener('focus',e=>e.target.select());}
  const cI=document.getElementById('cashInput');
  if(cI){cI.addEventListener('input',e=>ss({cashReceived:e.target.value}));cI.addEventListener('focus',e=>e.target.select());}

  // M-Pesa phone field — keep state silently
  const mP=document.getElementById('mpesaPhone');
  if(mP){mP.addEventListener('input',e=>{S.mpesaPhone=e.target.value;});mP.addEventListener('focus',e=>e.target.select());}

  // M-Pesa STK Push
  document.getElementById('mpesaPushBtn')?.addEventListener('click',async()=>{
    const phone=(document.getElementById('mpesaPhone')?.value||'').trim();
    if(!phone){notif('Enter M-Pesa phone number','danger');return;}
    const sub=S.cart.reduce((a,i)=>a+i.price*i.qty,0);
    const total=sub-Math.min(S.discount||0,sub);
    if(total<=0){notif('Cart is empty','danger');return;}
    ss({mpesaPending:true,mpesaPhone:phone,mpesaStatus:{ok:false,msg:'Sending push to '+phone+'…'}});
    try{
      const res=await mpesaSTK(phone,total,'MM'+Date.now());
      if(res.ResponseCode==='0'){
        ss({mpesaPending:false,mpesaStatus:{ok:true,msg:'✓ Check your phone and enter M-Pesa PIN!'},mpesaCheckId:res.CheckoutRequestID});
        notif('M-Pesa prompt sent!','success');
        // Poll for payment confirmation every 5s
        clearInterval(mpesaPollTimer);
        let polls=0;
        mpesaPollTimer=setInterval(async()=>{
          if(!S.mpesaCheckId||polls>12){clearInterval(mpesaPollTimer);return;}
          polls++;
          try{
            const q=await mpesaQuery(S.mpesaCheckId);
            if(q.ResultCode==='0'){
              clearInterval(mpesaPollTimer);
              ss({mpesaStatus:{ok:true,msg:'✅ Payment confirmed! Completing sale…'},mpesaCheckId:null});
              setTimeout(()=>document.getElementById('checkoutBtn')?.click(),800);
            } else if(q.ResultCode&&q.ResultCode!=='1032'){
              clearInterval(mpesaPollTimer);
              ss({mpesaStatus:{ok:false,msg:'Payment failed: '+(q.ResultDesc||'Cancelled')}});
            } else {
              ss({mpesaStatus:{ok:false,msg:`⏳ Waiting for payment… (${polls*5}s)`}});
            }
          }catch{}
        },5000);
      } else {
        ss({mpesaPending:false,mpesaStatus:{ok:false,msg:'Error: '+(res.errorMessage||res.ResponseDescription||'Failed')}});
        notif('M-Pesa failed — '+( res.errorMessage||'check credentials'),'danger');
      }
    }catch(err){
      ss({mpesaPending:false,mpesaStatus:{ok:false,msg:'Network error. Ensure backend proxy is set up for CORS.'}});
      notif('M-Pesa error — see console','danger');
      console.error('M-Pesa:',err);
    }
  });

  // Checkout
  document.getElementById('checkoutBtn')?.addEventListener('click',()=>{
    if(S.cart.length===0)return;
    const sub=S.cart.reduce((a,i)=>a+i.price*i.qty,0);
    const disc=Math.min(S.discount||0,sub);
    const total=sub-disc;
    const tax=Math.round(total*.16/1.16);
    if(S.payMethod==='cash'&&S.cashReceived&&Number(S.cashReceived)<total){notif('Cash received is less than total','danger');return;}
    const now=new Date(),sid=DB.sales.length+1;
    const sale={id:sid,items:S.cart.map(i=>({productId:i.productId,name:i.name,qty:i.qty,price:i.price,cost:i.cost})),subtotal:sub,discount:disc,tax,total,paymentMethod:S.payMethod,cashier:DB.currentUser.name,customerId:S.selectedCust,date:now.toISOString(),receiptNo:'RCP'+String(sid).padStart(5,'0')};
    S.cart.forEach(item=>{const p=DB.products.find(p=>p.id===item.productId);if(p)p.stock=Math.max(0,p.stock-item.qty);});
    if(S.selectedCust){const c=DB.customers.find(c=>c.id===S.selectedCust);if(c){c.points+=Math.round(total*.02);c.totalSpent+=total;c.transactions++;}}
    DB.sales.push(sale);
    DB.actLog.unshift({user:DB.currentUser.name,action:`Sale ${sale.receiptNo} — ${fmt(total)} via ${sale.paymentMethod}`,time:now.toISOString()});
    const change=S.payMethod==='cash'&&S.cashReceived?Math.max(0,Number(S.cashReceived)-total):0;
    clearInterval(mpesaPollTimer);
    ss({cart:[],discount:0,selectedCust:null,cashReceived:'',mpesaStatus:null,mpesaPhone:'',mpesaCheckId:null,mpesaPending:false,modal:{type:'receipt',sale,change}});
    notif('Sale complete! '+fmt(total),'success');
  });

  // Customer select (POS)
  document.getElementById('posCustBtn')?.addEventListener('click',()=>ss({modal:{type:'selCust'}}));
  document.querySelectorAll('[data-selc]').forEach(el=>{
    el.style.cssText+='transition:.1s';
    el.onmouseenter=()=>el.style.background='#f0fdf4';
    el.onmouseleave=()=>el.style.background='';
    el.onclick=()=>{const id=parseInt(el.dataset.selc);ss({selectedCust:id||null,modal:null});notif(id?'Customer selected':'Walk-in customer');};
  });
  // Customer modal search filter
  document.getElementById('custMSearch')?.addEventListener('input',e=>{
    const q=e.target.value.toLowerCase();
    document.querySelectorAll('.cust-row').forEach(row=>{
      const txt=row.textContent.toLowerCase();
      row.style.display=txt.includes(q)?'':'none';
    });
  });

  // View sale
  document.querySelectorAll('[data-viewsale]').forEach(el=>el.onclick=()=>ss({modal:{type:'viewSale',sid:parseInt(el.dataset.viewsale)}}));
  document.querySelectorAll('[data-printreceipt]').forEach(el=>el.onclick=()=>{
    const sale=DB.sales.find(s=>s.id===parseInt(el.dataset.printreceipt));
    if(sale)ss({modal:{type:'receipt',sale,change:0}});
  });

  // Products
  document.getElementById('addProdBtn')?.addEventListener('click',()=>ss({modal:{type:'addProd'}}));
  document.getElementById('scanAddBtn')?.addEventListener('click',()=>ss({modal:{type:'scanProd'}}));
  document.querySelectorAll('[data-editprod]').forEach(el=>el.onclick=()=>ss({modal:{type:'editProd',pid:parseInt(el.dataset.editprod)}}));
  document.querySelectorAll('[data-delprod]').forEach(el=>el.onclick=()=>{
    if(!window.confirm('Delete "'+DB.products.find(p=>p.id===parseInt(el.dataset.delprod))?.name+'"?'))return;
    DB.products.splice(DB.products.findIndex(p=>p.id===parseInt(el.dataset.delprod)),1);render();notif('Product deleted');
  });
  document.getElementById('saveProdBtn')?.addEventListener('click',()=>{
    const name=document.getElementById('pName').value.trim();
    const buy=parseFloat(document.getElementById('pBuy').value);
    const sell=parseFloat(document.getElementById('pSell').value);
    if(!name||isNaN(buy)||isNaN(sell)){notif('Name, buy & sell price required','danger');return;}
    const data={name,sku:document.getElementById('pSku').value||'SKU'+Date.now(),category:parseInt(document.getElementById('pCat').value)||1,emoji:document.getElementById('pEmoji').value||'🛍️',buyPrice:buy,sellPrice:sell,stock:parseInt(document.getElementById('pStock').value)||0,minStock:parseInt(document.getElementById('pMin').value)||10,barcode:document.getElementById('pBarcode').value,active:true};
    if(S.modal.type==='editProd'){Object.assign(DB.products.find(p=>p.id===S.modal.pid),data);notif('Product updated!');}
    else{data.id=Date.now();DB.products.push(data);notif('Product added!');}
    ss({modal:null});
  });
  // Scan barcode in product modal
  document.getElementById('scanBarBtn')?.addEventListener('click',()=>{
    const bc=document.getElementById('pBarcode');if(bc)bc.focus();
    notif('Scanner active — scan barcode now','info');
  });
  // Scanner modal barcode input
  const mb=document.getElementById('manualBarcode');
  if(mb){mb.addEventListener('keydown',e=>{if(e.key==='Enter'){
    const code=mb.value.trim();
    const prod=DB.products.find(p=>p.barcode===code||p.sku.toLowerCase()===code.toLowerCase());
    const res=document.getElementById('scanResult');
    if(prod){res.innerHTML=`<div class="alert alert-success"><i class="ti ti-check"></i> Found: <strong>${prod.emoji} ${prod.name}</strong> — ${fmt(prod.sellPrice)} — Stock: ${prod.stock}</div>`;mb.value='';}
    else{res.innerHTML=`<div class="alert alert-danger"><i class="ti ti-alert-circle"></i> Product not found for: <strong>${code}</strong></div>`;}
  }});mb.focus();}

  // Inventory
  document.getElementById('stockAdjBtn')?.addEventListener('click',()=>ss({modal:{type:'adjStock',pid:DB.products[0]?.id}}));
  document.querySelectorAll('[data-adjstock]').forEach(el=>el.onclick=()=>ss({modal:{type:'adjStock',pid:parseInt(el.dataset.adjstock)}}));
  document.getElementById('saveAdjBtn')?.addEventListener('click',()=>{
    const prod=DB.products.find(p=>p.id===S.modal.pid);
    const qty=parseInt(document.getElementById('adjQty').value)||0;
    const type=document.getElementById('adjType').value;
    if(!prod){notif('Product not found','danger');return;}
    if(type==='add')prod.stock+=qty;else if(type==='remove')prod.stock=Math.max(0,prod.stock-qty);else prod.stock=qty;
    DB.invLog.unshift({product:prod.name,qty,type,reason:document.getElementById('adjReason').value,date:new Date().toISOString()});
    ss({modal:null});notif(`${prod.name}: stock → ${prod.stock} units`);
  });

  // Suppliers
  document.getElementById('addSupBtn')?.addEventListener('click',()=>ss({modal:{type:'addSup'}}));
  document.getElementById('saveSupBtn')?.addEventListener('click',()=>{
    const name=document.getElementById('snName').value.trim();
    if(!name){notif('Company name required','danger');return;}
    DB.suppliers.push({id:Date.now(),name,contact:document.getElementById('snContact').value,phone:document.getElementById('snPhone').value,email:document.getElementById('snEmail').value,category:document.getElementById('snCat').value,active:true});
    ss({modal:null});notif('Supplier added!');
  });

  // Customers
  document.getElementById('addCustBtn')?.addEventListener('click',()=>ss({modal:{type:'addCust'}}));
  document.getElementById('saveCustBtn')?.addEventListener('click',()=>{
    const name=document.getElementById('cName').value.trim();
    const phone=document.getElementById('cPhone').value.trim();
    if(!name||!phone){notif('Name and phone required','danger');return;}
    DB.customers.push({id:Date.now(),name,phone,email:document.getElementById('cEmail').value,points:0,balance:0,totalSpent:0,transactions:0,joined:new Date().toISOString().split('T')[0]});
    ss({modal:null});notif('Customer added!');
  });

  // Employees
  document.getElementById('addEmpBtn')?.addEventListener('click',()=>ss({modal:{type:'addEmp'}}));
  document.getElementById('saveEmpBtn')?.addEventListener('click',()=>{
    const name=document.getElementById('eName').value.trim();
    const pin=document.getElementById('ePin').value;
    if(!name||!pin){notif('Name and PIN required','danger');return;}
    DB.users.push({id:Date.now(),name,email:document.getElementById('eEmail').value,role:document.getElementById('eRole').value,pin,active:true,created:new Date().toISOString().split('T')[0]});
    ss({modal:null});notif('Employee added!');
  });

  // Settings
  document.getElementById('saveSettBtn')?.addEventListener('click',()=>{
    DB.settings.storeName=document.getElementById('sName').value;
    DB.settings.storeAddress=document.getElementById('sAddr').value;
    DB.settings.phone=document.getElementById('sPhone').value;
    DB.settings.branch=document.getElementById('sBranch').value;
    DB.settings.taxRate=parseFloat(document.getElementById('sTax').value)||16;
    notif('Settings saved!');
  });
  document.getElementById('testMpesaBtn')?.addEventListener('click',async()=>{
    notif('Testing M-Pesa connection…','info');
    try{const tok=await mpesaToken();if(tok){notif('✓ M-Pesa connection successful!','success');}else{notif('Connection failed — check credentials','danger');}}
    catch(e){notif('Connection failed: '+e.message,'danger');}
  });
  document.getElementById('exportBtn')?.addEventListener('click',()=>{
    const data={products:DB.products,sales:DB.sales,customers:DB.customers,suppliers:DB.suppliers,exportedAt:new Date().toISOString()};
    const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
    a.download='minimart-backup-'+new Date().toISOString().split('T')[0]+'.json';a.click();notif('Data exported!');
  });
  const exportCSV=()=>{
    const header='Receipt,Date,Items,Payment,Cashier,Total\n';
    const rows=DB.sales.map(s=>`${s.receiptNo},${fmtDT(s.date)},${s.items.length},${s.paymentMethod},${s.cashier},${s.total}`).join('\n');
    const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([header+rows],{type:'text/csv'}));
    a.download='minimart-sales-'+new Date().toISOString().split('T')[0]+'.csv';a.click();notif('CSV exported!');
  };
  document.getElementById('exportCSVBtn')?.addEventListener('click',exportCSV);
  document.getElementById('exportCsvBtn2')?.addEventListener('click',exportCSV);
  document.getElementById('clearSalesBtn')?.addEventListener('click',()=>{
    if(window.confirm('Clear ALL sales data? This cannot be undone.')){DB.sales=[];render();notif('Sales data cleared');}
  });
}

// ════════════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════════════
render();
</script>
</body>
</html>
