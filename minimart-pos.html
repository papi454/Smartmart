<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>MiniMart POS System</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#16a34a;--green-dark:#15803d;--green-light:#dcfce7;--green-muted:#bbf7d0;
  --sidebar-bg:#111827;--sidebar-text:#9ca3af;
  --bg:#f8fafc;--card:#fff;--border:#e2e8f0;--text:#1e293b;--muted:#64748b;
  --red:#ef4444;--amber:#f59e0b;--blue:#3b82f6;--purple:#8b5cf6;
  --shadow:0 1px 3px rgba(0,0,0,.08);--radius:8px;--radius-lg:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;font-size:14px}
#app{display:flex;width:100%;height:100vh}
.sidebar{width:220px;min-width:220px;background:var(--sidebar-bg);display:flex;flex-direction:column;overflow-y:auto}
.sidebar-logo{padding:20px 16px;border-bottom:1px solid #1f2937;display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:var(--green);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff}
.logo-text{color:#fff;font-size:15px;font-weight:600}
.logo-sub{color:var(--sidebar-text);font-size:11px}
.sidebar-nav{flex:1;padding:12px 8px}
.nav-label{font-size:10px;font-weight:600;color:#4b5563;text-transform:uppercase;letter-spacing:.8px;padding:4px 10px;margin-bottom:4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:7px;cursor:pointer;color:var(--sidebar-text);font-size:13px;font-weight:500;transition:.15s}
.nav-item:hover{background:#1f2937;color:#d1d5db}
.nav-item.active{background:#14532d;color:#86efac}
.nav-item .ti{font-size:16px;width:20px;text-align:center}
.nav-badge{margin-left:auto;background:#ef4444;color:#fff;font-size:10px;border-radius:10px;padding:1px 6px;font-weight:600}
.sidebar-footer{padding:12px 16px;border-top:1px solid #1f2937}
.user-card{display:flex;align-items:center;gap:10px}
.user-avatar{width:32px;height:32px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar h1{font-size:18px;font-weight:600}
.content{flex:1;overflow-y:auto;padding:24px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:15px;font-weight:600}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;display:flex;flex-direction:column;gap:10px}
.stat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.stat-icon.green{background:#dcfce7;color:#16a34a}
.stat-icon.blue{background:#dbeafe;color:#2563eb}
.stat-icon.amber{background:#fef3c7;color:#d97706}
.stat-icon.purple{background:#ede9fe;color:#7c3aed}
.stat-icon.red{background:#fee2e2;color:#dc2626}
.stat-value{font-size:24px;font-weight:700;line-height:1}
.stat-label{font-size:12px;color:var(--muted);font-weight:500}
.stat-change{font-size:12px;font-weight:500;display:flex;align-items:center;gap:3px}
.stat-change.up{color:#16a34a}.stat-change.down{color:#ef4444}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.grid-65-35{display:grid;grid-template-columns:1.8fr 1fr;gap:16px}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);background:#f8fafc}
td{padding:11px 12px;border-bottom:1px solid #f1f5f9;color:var(--text)}
tr:hover td{background:#f8fafc}
tr:last-child td{border-bottom:none}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:#dcfce7;color:#15803d}
.badge-red{background:#fee2e2;color:#b91c1c}
.badge-amber{background:#fef3c7;color:#b45309}
.badge-blue{background:#dbeafe;color:#1d4ed8}
.badge-purple{background:#ede9fe;color:#6d28d9}
.badge-gray{background:#f1f5f9;color:#475569}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:.15s}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--green);color:#fff}.btn-primary:hover{background:var(--green-dark)}
.btn-secondary{background:var(--card);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{background:#f1f5f9}
.btn-danger{background:#ef4444;color:#fff}.btn-danger:hover{background:#dc2626}
.btn-blue{background:#3b82f6;color:#fff}.btn-blue:hover{background:#2563eb}
.btn-amber{background:#f59e0b;color:#fff}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-icon{padding:7px}
.form-group{margin-bottom:14px}
.form-label{font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.form-control{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;color:var(--text);background:var(--card);outline:none;transition:.15s}
.form-control:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(22,163,74,.1)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--card);border-radius:var(--radius-lg);width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border)}
.modal-title{font-size:16px;font-weight:700}
.modal-body{padding:20px}
.modal-footer{padding:16px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}
.modal-lg{max-width:760px}
.pos-layout{display:grid;grid-template-columns:1fr 370px;height:calc(100vh - 56px);overflow:hidden}
.pos-products{overflow-y:auto;padding:16px;background:var(--bg)}
.pos-cart{background:var(--card);border-left:1px solid var(--border);display:flex;flex-direction:column}
.cart-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.cart-items{flex:1;overflow-y:auto;padding:8px}
.cart-item{display:flex;align-items:center;gap:8px;padding:10px;border-radius:var(--radius);border:1px solid var(--border);margin-bottom:6px;background:var(--bg)}
.qty-btn{width:26px;height:26px;border-radius:50%;border:1px solid var(--border);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700}
.qty-btn:hover{background:var(--green);color:#fff;border-color:var(--green)}
.qty-val{font-size:13px;font-weight:700;min-width:20px;text-align:center}
.cart-summary{padding:14px 16px;border-top:1px solid var(--border)}
.summary-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;color:var(--muted)}
.summary-total{display:flex;justify-content:space-between;font-size:16px;font-weight:700;padding-top:8px;border-top:1px solid var(--border);margin-top:4px}
.payment-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px}
.pay-btn{padding:10px 4px;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--card);cursor:pointer;text-align:center;font-size:12px;font-weight:600;color:var(--muted);transition:.15s}
.pay-btn.active{border-color:var(--green);background:var(--green-light);color:var(--green-dark)}
.pay-btn:hover:not(.active){background:#f1f5f9}
.pay-btn .ti{display:block;font-size:20px;margin-bottom:4px}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.product-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px;cursor:pointer;transition:.15s;text-align:center}
.product-card:hover{border-color:var(--green);box-shadow:0 0 0 3px rgba(22,163,74,.1)}
.product-card:active{transform:scale(.97)}
.product-emoji{font-size:28px;margin-bottom:6px}
.product-name{font-size:11px;font-weight:600;margin-bottom:4px;line-height:1.3}
.product-price{font-size:13px;font-weight:700;color:var(--green)}
.product-stock{font-size:10px;color:var(--muted)}
.search-bar{position:relative}
.search-bar input{width:100%;padding:9px 12px 9px 36px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;background:var(--card);outline:none}
.search-bar input:focus{border-color:var(--green)}
.search-bar .ti{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px}
.alert{padding:12px 16px;border-radius:var(--radius);font-size:13px;display:flex;align-items:flex-start;gap:8px;margin-bottom:12px}
.alert-warning{background:#fef3c7;border:1px solid #fde68a;color:#92400e}
.alert-danger{background:#fee2e2;border:1px solid #fecaca;color:#991b1b}
.alert-success{background:#dcfce7;border:1px solid #bbf7d0;color:#166534}
.alert-info{background:#dbeafe;border:1px solid #bfdbfe;color:#1e40af}
.progress-bar{height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;background:var(--green);transition:.3s}
.tabs{display:flex;gap:4px;background:#f1f5f9;border-radius:var(--radius);padding:4px;margin-bottom:18px}
.tab{padding:7px 14px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;color:var(--muted);transition:.15s}
.tab.active{background:var(--card);color:var(--text)}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-size:16px;font-weight:700}
.empty-state{text-align:center;padding:48px 24px;color:var(--muted)}
.receipt{background:#fff;padding:20px;font-family:monospace;font-size:12px;border:2px dashed #ddd;border-radius:8px;white-space:pre;line-height:1.6}
.notification{position:fixed;top:16px;right:16px;background:#1e293b;color:#fff;padding:12px 18px;border-radius:var(--radius-lg);font-size:13px;z-index:9999;display:flex;align-items:center;gap:8px;animation:slideIn .3s ease}
@keyframes slideIn{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}
.chip-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.chip{padding:5px 12px;border-radius:20px;border:1px solid var(--border);font-size:12px;font-weight:500;cursor:pointer;background:var(--card);color:var(--muted);transition:.15s}
.chip.active{background:var(--green);color:#fff;border-color:var(--green)}
.chip:hover:not(.active){background:#f1f5f9}
.login-screen{position:fixed;inset:0;background:var(--sidebar-bg);display:flex;align-items:center;justify-content:center;z-index:9998}
.login-box{background:var(--card);border-radius:var(--radius-lg);padding:36px;width:360px}
.login-logo{text-align:center;margin-bottom:28px}
.mpesa-spinner{display:inline-block;width:20px;height:20px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.mpesa-modal-icon{width:64px;height:64px;background:#1da462;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:28px;color:#fff}
@media print{.sidebar,.topbar,.pos-cart,.btn:not(.print-include){display:none!important}.content{padding:0}.receipt{border:none}}
</style>
</head>

// Generate sample sales history
(function(){
  const now = new Date(); let id = 1;
  for(let d=30;d>=0;d--){
    const n = Math.floor(Math.random()*8)+3;
    for(let s=0;s<n;s++){
      const ni = Math.floor(Math.random()*4)+1, items=[];
      let sub=0;
      for(let i=0;i<ni;i++){
        const p=DB.products[Math.floor(Math.random()*DB.products.length)],q=Math.floor(Math.random()*3)+1;
        items.push({productId:p.id,name:p.name,qty:q,price:p.sellPrice,cost:p.buyPrice});
        sub+=p.sellPrice*q;
      }
      const disc=Math.random()>.8?Math.floor(sub*.05):0, tax=Math.round((sub-disc)*.16/1.16);
      const date=new Date(now); date.setDate(date.getDate()-d); date.setHours(Math.floor(Math.random()*12)+8,Math.floor(Math.random()*60));
      const methods=['cash','mpesa','card'];
      DB.sales.push({id:id++,items,subtotal:sub,discount:disc,tax,total:sub-disc,
        paymentMethod:methods[Math.floor(Math.random()*3)],
        cashier:d%3===0?'Jane Cashier':'Bob Manager',
        customerId:Math.random()>.6?Math.floor(Math.random()*4)+1:null,
        date:date.toISOString(),receiptNo:`RCP${String(id-1).padStart(5,'0')}`});
    }
  }
})();

// ===================== UTILITIES =====================
const fmt = n => `KSh ${Number(n).toLocaleString()}`;
const fmtDate = d => new Date(d).toLocaleDateString('en-KE',{day:'2-digit',month:'short',year:'numeric'});
const fmtTime = d => new Date(d).toLocaleTimeString('en-KE',{hour:'2-digit',minute:'2-digit'});
const fmtDT = d => `${fmtDate(d)} ${fmtTime(d)}`;
let notifTimer;
function notify(msg,type='success'){
  document.querySelector('.notification')?.remove();
  const cols={success:'#16a34a',danger:'#ef4444',info:'#3b82f6',warning:'#d97706'};
  const icns={success:'ti-check',danger:'ti-alert-circle',info:'ti-info-circle',warning:'ti-alert-triangle'};
  const n=document.createElement('div'); n.className='notification';
  n.innerHTML=`<i class="ti ${icns[type]}" style="color:${cols[type]}"></i><span>${msg}</span>`;
  document.body.appendChild(n);
  clearTimeout(notifTimer); notifTimer=setTimeout(()=>n.remove(),3500);
}

// ===================== M-PESA STK PUSH =====================
const MPesa = {
  token: null, tokenExpiry: 0,

  async getToken() {
    if(this.token && Date.now() < this.tokenExpiry) return this.token;
    const base = MPESA_CONFIG.environment === 'production'
      ? 'https://api.safaricom.co.ke'
      : 'https://sandbox.safaricom.co.ke';
    const creds = btoa(`${MPESA_CONFIG.consumerKey}:${MPESA_CONFIG.consumerSecret}`);
    try {
      const res = await fetch(`${base}/oauth/v1/generate?grant_type=client_credentials`, {
        headers: { 'Authorization': `Basic ${creds}` }
      });
      const data = await res.json();
      this.token = data.access_token;
      this.tokenExpiry = Date.now() + (parseInt(data.expires_in)-60)*1000;
      return this.token;
    } catch(e) {
      console.error('M-Pesa token error:', e);
      return null;
    }
  },

  getPassword() {
    const ts = this.getTimestamp();
    return btoa(`${MPESA_CONFIG.shortcode}${MPESA_CONFIG.passkey}${ts}`);
  },

  getTimestamp() {
    return new Date().toISOString().replace(/[-T:.Z]/g,'').slice(0,14);
  },

  async stkPush(phone, amount, accountRef, description) {
    const base = MPESA_CONFIG.environment === 'production'
      ? 'https://api.safaricom.co.ke'
      : 'https://sandbox.safaricom.co.ke';
    const token = await this.getToken();
    if(!token) throw new Error('Could not get M-Pesa token');
    const sanitized = phone.replace(/^0/,'254').replace(/\D/g,'');
    const payload = {
      BusinessShortCode: MPESA_CONFIG.shortcode,
      Password: this.getPassword(),
      Timestamp: this.getTimestamp(),
      TransactionType: 'CustomerPayBillOnline',
      Amount: Math.ceil(amount),
      PartyA: sanitized,
      PartyB: MPESA_CONFIG.shortcode,
      PhoneNumber: sanitized,
      CallBackURL: MPESA_CONFIG.callbackURL,
      AccountReference: accountRef,
      TransactionDesc: description
    };
    const res = await fetch(`${base}/mpesa/stkpush/v1/processrequest`, {
      method:'POST',
      headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    return await res.json();
  }
};

  employees(){

    return `<div class="section-header"><div class="section-title">Employees (${DB.users.length})</div>
      <button class="btn btn-primary" id="addEmpBtn"><i class="ti ti-plus"></i> Add Employee</button>

        <div><div style="font-size:15px;font-weight:700">${u.name}</div><span class="badge badge-${rc[u.role]||'gray'}">${u.role}</span></div>

      ${DB.activityLog.length?`<div class="table-wrap"><table>
        <thead><tr><th>User</th><th>Action</th><th>Time</th></tr></thead>
        <tbody>${DB.activityLog.slice(0,20).map(l=>`<tr><td style="font-weight:600">${l.user}</td><td>${l.action}</td><td style="color:var(--muted)">${fmtDT(l.time)}</td></tr>`).join('')}</tbody>
      </table></div>`:`<div style="text-align:center;padding:24px;color:var(--muted)">No activity yet</div>`}
    </div>`;
  },

  reports(){
    const today=new Date().toDateString();
    const ts=DB.sales.filter(s=>new Date(s.date).toDateString()===today);
    const ma=new Date(); ma.setDate(ma.getDate()-30);
    const ms=DB.sales.filter(s=>new Date(s.date)>=ma);
    const mr=ms.reduce((a,s)=>a+s.total,0), mc=ms.reduce((a,s)=>a+s.items.reduce((b,i)=>b+i.cost*i.qty,0),0);
    const pb={cash:0,mpesa:0,card:0}; ms.forEach(s=>{pb[s.paymentMethod]=(pb[s.paymentMethod]||0)+s.total;});
    const l14=[]; for(let i=13;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const ss=DB.sales.filter(s=>new Date(s.date).toDateString()===d.toDateString());l14.push({l:d.toLocaleDateString('en-KE',{day:'2-digit',month:'short'}),rv:ss.reduce((a,s)=>a+s.total,0)});}
    const mb=Math.max(...l14.map(d=>d.rv))||1;
    const pm={}; ms.forEach(s=>s.items.forEach(it=>{if(!pm[it.productId])pm[it.productId]={name:it.name,qty:0,rev:0,cost:0};pm[it.productId].qty+=it.qty;pm[it.productId].rev+=it.qty*it.price;pm[it.productId].cost+=it.qty*(it.cost||0);}));
    return `<div class="stats-grid">
      <div class="stat-card"><div class="stat-icon green"><i class="ti ti-currency-dollar"></i></div><div class="stat-value">${fmt(ts.reduce((a,s)=>a+s.total,0))}</div><div class="stat-label">Today Revenue</div></div>
      <div class="stat-card"><div class="stat-icon blue"><i class="ti ti-receipt"></i></div><div class="stat-value">${ts.length}</div><div class="stat-label">Today Transactions</div></div>
      <div class="stat-card"><div class="stat-icon amber"><i class="ti ti-calendar-month"></i></div><div class="stat-value">${fmt(mr)}</div><div class="stat-label">30-Day Revenue</div></div>
      <div class="stat-card"><div class="stat-icon purple"><i class="ti ti-trending-up"></i></div><div class="stat-value">${fmt(mr-mc)}</div><div class="stat-label">30-Day Profit</div></div>
    </div>
    <div class="grid-65-35" style="margin-bottom:16px">
      <div class="card"><div class="card-header"><div class="card-title">Daily Revenue — Last 14 Days</div></div>
        <div style="display:flex;align-items:flex-end;gap:3px;height:160px;padding:0 4px">
          ${l14.map(d=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
            <div style="width:100%;background:#bbf7d0;border-radius:3px 3px 0 0;height:${Math.max(4,Math.round(d.rv/mb*140))}px"></div>
            <div style="font-size:10px;color:var(--muted);transform:rotate(-45deg);transform-origin:right;white-space:nowrap">${d.l}</div>
          </div>`).join('')}
        </div>
      </div>
      <div class="card"><div class="card-header"><div class="card-title">Payment Methods</div></div>
        ${Object.entries(pb).map(([m,v])=>{const p=Math.round(v/(mr||1)*100);return `<div style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span style="font-weight:600">${m==='mpesa'?'M-Pesa':m.charAt(0).toUpperCase()+m.slice(1)}</span><span>${p}% • ${fmt(v)}</span></div>
          <div class="progress-bar"><div class="progress-fill" style="width:${p}%;background:${m==='mpesa'?'var(--green)':m==='card'?'var(--blue)':'var(--amber)'}"></div></div>
        </div>`;}).join('')}
        <div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border)">
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px"><span>Revenue</span><strong>${fmt(mr)}</strong></div>
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px"><span>Cost</span><strong style="color:var(--red)">${fmt(mc)}</strong></div>
          <div style="display:flex;justify-content:space-between;font-size:14px;font-weight:700;color:var(--green)"><span>Gross Profit</span><strong>${fmt(mr-mc)}</strong></div>
        </div>
      </div>
    </div>
    <div class="card"><div class="card-header"><div class="card-title">Product Performance (30 Days)</div></div>
      <div class="table-wrap"><table>
        <thead><tr><th>Product</th><th>Units Sold</th><th>Revenue</th><th>Cost</th><th>Profit</th><th>Margin</th></tr></thead>
        <tbody>${Object.values(pm).sort((a,b)=>b.rev-a.rev).slice(0,12).map(p=>{const pr=p.rev-p.cost,mg=p.rev>0?Math.round(pr/p.rev*100):0;return `<tr>
          <td style="font-weight:600">${p.name}</td><td>${p.qty}</td><td>${fmt(p.rev)}</td>
          <td style="color:var(--muted)">${fmt(p.cost)}</td>
          <td style="color:var(--green);font-weight:700">${fmt(pr)}</td>
          <td><span class="badge badge-${mg>30?'green':mg>15?'amber':'red'}">${mg}%</span></td>
        </tr>`;}).join('')}</tbody>
      </table></div>
    </div>`;
  },

  settings(){
    const s=DB.settings;
    return `<div class="grid-2">
      <div class="card">
        <div class="card-header"><div class="card-title">Store Settings</div></div>
        <div class="form-group"><label class="form-label">Store Name</label><input class="form-control" id="ssN" value="${s.storeName}"/></div>
        <div class="form-group"><label class="form-label">Address</label><input class="form-control" id="ssA" value="${s.storeAddress}"/></div>
        <div class="form-group"><label class="form-label">Phone</label><input class="form-control" id="ssP" value="${s.phone}"/></div>
        <div class="form-group"><label class="form-label">Branch</label><input class="form-control" id="ssB" value="${s.branch}"/></div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Currency</label><input class="form-control" value="${s.currency}" readonly/></div>
          <div class="form-group"><label class="form-label">VAT Rate (%)</label><input type="number" class="form-control" id="ssT" value="${s.taxRate}"/></div>
        </div>
        <button class="btn btn-primary" id="saveSetBtn"><i class="ti ti-check"></i> Save Settings</button>
      </div>
      <div>
        <div class="card" style="margin-bottom:16px">
          <div class="card-header"><div class="card-title"><i class="ti ti-device-mobile" style="color:#1da462"></i> M-Pesa Configuration</div></div>
          <div class="alert alert-warning"><i class="ti ti-alert-triangle"></i> Keep your API keys secret. Never share them publicly.</div>
          <div class="form-group"><label class="form-label">Environment</label>
            <select class="form-control" id="mpEnv"><option value="sandbox"${MPESA_CONFIG.environment==='sandbox'?' selected':''}>Sandbox (Testing)</option><option value="production"${MPESA_CONFIG.environment==='production'?' selected':''}>Production (Live)</option></select>
          </div>
          <div class="form-group"><label class="form-label">Shortcode / Paybill</label><input class="form-control" id="mpSC" value="${MPESA_CONFIG.shortcode}"/></div>
          <div class="form-group"><label class="form-label">Callback URL</label><input class="form-control" id="mpCB" value="${MPESA_CONFIG.callbackURL}"/></div>
          <button class="btn btn-primary" id="saveMpBtn"><i class="ti ti-check"></i> Save M-Pesa Config</button>
        </div>
        <div class="card">
          <div class="card-header"><div class="card-title">System Info</div></div>
          <div style="display:flex;flex-direction:column;gap:10px;font-size:13px">
            ${[['Version','MiniMart POS v2.1'],['Total Sales',DB.sales.length.toLocaleString()],['Products',DB.products.length],['Customers',DB.customers.length],['M-Pesa',MPESA_CONFIG.environment==='sandbox'?'Sandbox Mode':'LIVE']].map(([l,v])=>`<div style="display:flex;justify-content:space-between"><span style="color:var(--muted)">${l}</span><strong>${v}</strong></div>`).join('')}
          </div>
        </div>
      </div>
    </div>`;
  }
};

// ===================== POS PAGE =====================
function posHTML(){
  const cats=[{id:0,name:'All',icon:'🏪'},...DB.categories];
  const filt=DB.products.filter(p=>{
    if(S.posCategory&&p.category!==S.posCategory)return false;
    if(S.searchTerm&&!p.name.toLowerCase().includes(S.searchTerm.toLowerCase())&&!p.barcode.includes(S.searchTerm))return false;
    return p.active&&p.stock>0;
  });
  const ct=S.cart.reduce((a,i)=>a+i.price*i.qty,0);
  const disc=Math.min(S.discount||0,ct);
  const tax=Math.round((ct-disc)*.16/1.16);
  const tot=ct-disc;
  const cust=S.selectedCustomer?DB.customers.find(c=>c.id===S.selectedCustomer):null;

  return `<div class="pos-layout">
    <div class="pos-products">
      <div style="display:flex;gap:10px;margin-bottom:10px">
        <div class="search-bar" style="flex:1"><i class="ti ti-search"></i><input type="text" id="posSearch" placeholder="Search product or scan barcode..." value="${S.searchTerm}"/></div>
        <button class="btn btn-secondary btn-sm" id="posCustBtn"><i class="ti ti-user"></i> ${cust?cust.name.split(' ')[0]:'Customer'}</button>
      </div>
      <div class="chip-bar">${cats.map(c=>`<span class="chip${S.posCategory===c.id?' active':''}" data-pc="${c.id}">${c.icon} ${c.name}</span>`).join('')}</div>
      <div class="product-grid">
        ${filt.map(p=>`<div class="product-card" data-ap="${p.id}">
          <div class="product-emoji">${p.emoji}</div>
          <div class="product-name">${p.name}</div>
          <div class="product-price">${fmt(p.sellPrice)}</div>
          <div class="product-stock">Stock: ${p.stock}</div>
        </div>`).join('')}
        ${filt.length===0?`<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--muted)"><i class="ti ti-search" style="font-size:32px;display:block;margin-bottom:8px"></i>No products found</div>`:''}
      </div>
    </div>
    <div class="pos-cart">
      <div class="cart-header">
        <div>
          <div style="font-size:14px;font-weight:700">Shopping Cart (${S.cart.length})</div>
          ${cust?`<div style="font-size:12px;color:var(--green)"><i class="ti ti-star"></i> ${cust.name} • ${cust.points} pts</div>`:''}
        </div>
        <button class="btn btn-icon btn-secondary btn-sm" id="clearCart"><i class="ti ti-trash"></i></button>
      </div>
      <div class="cart-items">
        ${S.cart.length===0?`<div style="text-align:center;padding:40px 20px;color:var(--muted)"><i class="ti ti-shopping-cart" style="font-size:36px;display:block;margin-bottom:8px"></i>Cart is empty<br><small>Click products to add</small></div>`
        :S.cart.map((item,idx)=>`<div class="cart-item">
          <div style="flex:1">
            <div style="font-size:13px;font-weight:600">${item.name}</div>
            <div style="font-size:13px;font-weight:700;color:var(--green)">${fmt(item.price*item.qty)}</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
            <button class="btn btn-icon btn-secondary btn-sm" data-rc="${idx}" style="padding:3px;width:18px;height:18px;font-size:10px"><i class="ti ti-x" style="font-size:11px"></i></button>
            <div style="display:flex;align-items:center;gap:6px">
              <button class="qty-btn" data-qd="${idx}">-</button>
              <span class="qty-val">${item.qty}</span>
              <button class="qty-btn" data-qu="${idx}">+</button>
            </div>
          </div>
        </div>`).join('')}
      </div>
      <div class="cart-summary">
        <div class="form-group" style="margin-bottom:10px">
          <input type="number" class="form-control" id="discInput" placeholder="Discount (KSh)" value="${S.discount||''}"/>
        </div>
        <div class="summary-row"><span>Subtotal</span><span>${fmt(ct)}</span></div>
        <div class="summary-row"><span>Discount</span><span style="color:var(--red)">-${fmt(disc)}</span></div>
        <div class="summary-row"><span>VAT (16% incl.)</span><span>${fmt(tax)}</span></div>
        <div class="summary-total"><span>TOTAL</span><span style="color:var(--green)">${fmt(tot)}</span></div>
        <div style="margin:10px 0 6px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px">Payment Method</div>
        <div class="payment-btns">
          <div class="pay-btn${S.paymentMethod==='cash'?' active':''}" data-pm="cash"><i class="ti ti-banknote"></i>Cash</div>
          <div class="pay-btn${S.paymentMethod==='mpesa'?' active':''}" data-pm="mpesa"><i class="ti ti-device-mobile"></i>M-Pesa</div>
          <div class="pay-btn${S.paymentMethod==='card'?' active':''}" data-pm="card"><i class="ti ti-credit-card"></i>Card</div>
        </div>
        ${S.paymentMethod==='cash'?`<div style="margin-top:8px">
          <input type="number" class="form-control" id="cashIn" placeholder="Cash received (KSh)" value="${S.cashReceived||''}"/>
          ${S.cashReceived&&Number(S.cashReceived)>=tot?`<div style="font-size:13px;color:var(--green);font-weight:600;margin-top:6px">Change: ${fmt(Number(S.cashReceived)-tot)}</div>`:''}
        </div>`:''}
        ${S.paymentMethod==='mpesa'?`<div style="margin-top:8px">
          <input type="text" class="form-control" id="mpesaPhone" placeholder="Customer phone e.g. 0712345678" value="${S.mpesaPhone||''}"/>
          <div style="font-size:11px;color:var(--muted);margin-top:4px"><i class="ti ti-info-circle"></i> STK Push will be sent to this number</div>
        </div>`:''}
        <button class="btn btn-primary" id="checkoutBtn" style="width:100%;justify-content:center;margin-top:12px;padding:13px;font-size:15px" ${S.cart.length===0?'disabled':''}>
          <i class="ti ti-${S.paymentMethod==='mpesa'?'device-mobile':'check'}"></i> ${S.paymentMethod==='mpesa'?'Send M-Pesa Request':'Charge'} ${fmt(tot)}
        </button>
      </div>
    </div>
  </div>`;
}

// ===================== MODALS =====================
function modalHTML(){
  const m=S.modal;
  if(m.type==='addProd'||m.type==='editProd') return productModalHTML();
  if(m.type==='viewSale') return viewSaleHTML();
  if(m.type==='receipt') return receiptHTML();
  if(m.type==='addCust') return addCustHTML();
  if(m.type==='selCust') return selCustHTML();
  if(m.type==='stockAdj') return stockAdjHTML();
  if(m.type==='addSup') return addSupHTML();
  if(m.type==='addEmp') return addEmpHTML();
  if(m.type==='mpesaWait') return mpesaWaitHTML();
  return '';
}

function modal(title,body,footer,noFooter){
  return `<div class="modal-overlay" id="mOv">
    <div class="modal${title.includes('Transaction')||title.includes('M-Pesa Pay')?'':''}" style="${noFooter?'max-width:480px':''}">
      <div class="modal-header"><div class="modal-title">${title}</div><button class="btn btn-icon btn-secondary btn-sm" id="closeModal"><i class="ti ti-x"></i></button></div>
      <div class="modal-body">${body}</div>
      ${footer?`<div class="modal-footer">${footer}</div>`:''}
    </div>
  </div>`;
}

// ===================== EVENT BINDING =====================
function bindAll(){
  const $ = id => document.getElementById(id);
  const close = () => set({modal:null});

  // nav & logout
  document.querySelectorAll('[data-nav]').forEach(el=>el.onclick=()=>nav(el.dataset.nav));
  $('logoutBtn')?.addEventListener('click',()=>{DB.currentUser=null;render();});
  $('qPosBtn')?.addEventListener('click',()=>nav('pos'));

  // modal close
  $('closeModal')?.addEventListener('click',close);
  $('closeModal2')?.addEventListener('click',close);
  $('mOv')?.addEventListener('click',e=>{if(e.target.id==='mOv')close();});

  // POS
  $('posSearch')?.addEventListener('input',e=>set({searchTerm:e.target.value}));
  document.querySelectorAll('[data-pc]').forEach(el=>el.onclick=()=>set({posCategory:parseInt(el.dataset.pc)}));
  document.querySelectorAll('[data-ap]').forEach(el=>el.onclick=()=>{
    const p=DB.products.find(x=>x.id===parseInt(el.dataset.ap));
    if(!p||p.stock<=0)return;
    const cart=[...S.cart], idx=cart.findIndex(c=>c.productId===p.id);
    if(idx>=0){if(cart[idx].qty>=p.stock){notify('Max stock reached','warning');return;}cart[idx]={...cart[idx],qty:cart[idx].qty+1};}
    else cart.push({productId:p.id,name:p.name,price:p.sellPrice,cost:p.buyPrice,qty:1,emoji:p.emoji});
    set({cart});
  });
  document.querySelectorAll('[data-qu]').forEach(el=>el.onclick=()=>{
    const idx=parseInt(el.dataset.qu),cart=[...S.cart],p=DB.products.find(x=>x.id===cart[idx].productId);
    if(cart[idx].qty<(p?p.stock:99)){cart[idx]={...cart[idx],qty:cart[idx].qty+1};set({cart});}
  });
  document.querySelectorAll('[data-qd]').forEach(el=>el.onclick=()=>{
    const idx=parseInt(el.dataset.qd),cart=[...S.cart];
    if(cart[idx].qty>1)cart[idx]={...cart[idx],qty:cart[idx].qty-1};else cart.splice(idx,1);
    set({cart});
  });
  document.querySelectorAll('[data-rc]').forEach(el=>el.onclick=()=>{
    const cart=[...S.cart];cart.splice(parseInt(el.dataset.rc),1);set({cart});
  });
  $('clearCart')?.addEventListener('click',()=>set({cart:[],discount:0,selectedCustomer:null,cashReceived:'',mpesaPhone:''}));
  document.querySelectorAll('[data-pm]').forEach(el=>el.onclick=()=>set({paymentMethod:el.dataset.pm}));
  $('discInput')?.addEventListener('input',e=>set({discount:parseFloat(e.target.value)||0}));
  $('cashIn')?.addEventListener('input',e=>set({cashReceived:e.target.value}));
  $('mpesaPhone')?.addEventListener('input',e=>set({mpesaPhone:e.target.value}));
  $('posCustBtn')?.addEventListener('click',()=>set({modal:{type:'selCust'}}));
  document.querySelectorAll('[data-sc]').forEach(el=>el.onclick=()=>{
    const id=parseInt(el.dataset.sc);
    set({selectedCustomer:id||null,modal:null});
    notify(id?`Customer: ${DB.customers.find(c=>c.id===id)?.name}`:'Walk-in customer selected');
  });

  // Checkout
  $('checkoutBtn')?.addEventListener('click',async()=>{
    if(S.cart.length===0)return;
    const ct=S.cart.reduce((a,i)=>a+i.price*i.qty,0);
    const disc=Math.min(S.discount||0,ct), tot=ct-disc, tax=Math.round(tot*.16/1.16);

    if(S.paymentMethod==='cash'&&S.cashReceived&&Number(S.cashReceived)<tot){notify('Cash received is less than total','danger');return;}

    if(S.paymentMethod==='mpesa'){
      const phone=(S.mpesaPhone||'').trim();
      if(!phone){notify('Enter customer M-Pesa phone number','danger');return;}
      // Send STK Push
      const btn=$('checkoutBtn'); if(btn){btn.disabled=true;btn.innerHTML='<span class="mpesa-spinner"></span> Sending STK Push...';}
      try {
        const result = await MPesa.stkPush(phone, tot, `MiniMart-${Date.now()}`, 'MiniMart Purchase');
        if(btn){btn.disabled=false;}
        if(result.ResponseCode==='0'){
          set({modal:{type:'mpesaWait',amount:tot,phone,pendingSale:{cart:S.cart,disc,tax,tot,customer:S.selectedCustomer}}});
          notify('STK Push sent — awaiting customer confirmation','info');
        } else {
          notify(`M-Pesa error: ${result.errorMessage||result.CustomerMessage||'Request failed'}`, 'danger');
        }
      } catch(err){
        if(btn){btn.disabled=false;}
        notify(`M-Pesa connection failed: ${err.message}`,'danger');
      }
      return;
    }

    completeSale(S.cart, disc, tax, tot, S.paymentMethod, S.selectedCustomer, S.cashReceived);
  });

  // Confirm M-Pesa payment manually
  $('confirmMpBtn')?.addEventListener('click',()=>{
    const ps=S.modal.pendingSale;
    if(ps) completeSale(ps.cart,ps.disc,ps.tax,ps.tot,'mpesa',ps.customer,'');
  });

  function completeSale(cart,disc,tax,tot,method,custId,cashRec){
    const now=new Date(), sid=DB.sales.length+1;
    const sale={id:sid,items:cart.map(i=>({productId:i.productId,name:i.name,qty:i.qty,price:i.price,cost:i.cost})),
      subtotal:cart.reduce((a,i)=>a+i.price*i.qty,0),discount:disc,tax,total:tot,
      paymentMethod:method,cashier:DB.currentUser.name,customerId:custId,
      cashPaid:method==='cash'?Number(cashRec)||tot:tot,
      date:now.toISOString(),receiptNo:`RCP${String(sid).padStart(5,'0')}`};
    cart.forEach(item=>{const p=DB.products.find(x=>x.id===item.productId);if(p)p.stock=Math.max(0,p.stock-item.qty);});
    if(custId){const c=DB.customers.find(x=>x.id===custId);if(c){c.points+=Math.round(tot*.02);c.totalSpent+=tot;c.transactions++;}}
    DB.sales.push(sale);
    DB.activityLog.unshift({user:DB.currentUser.name,action:`Sale ${sale.receiptNo} — ${fmt(tot)} via ${method==='mpesa'?'M-Pesa':method}`,time:now.toISOString()});
    const change=method==='cash'&&cashRec?Math.max(0,Number(cashRec)-tot):0;
    set({cart:[],discount:0,selectedCustomer:null,cashReceived:'',mpesaPhone:'',modal:{type:'receipt',sale,change}});
    notify(`Sale complete! ${fmt(tot)} via ${method==='mpesa'?'M-Pesa':method}`);
  }

  // Transactions
  $('txSearch')?.addEventListener('input',e=>set({searchTerm:e.target.value}));
  document.querySelectorAll('[data-vs]').forEach(el=>el.onclick=()=>set({modal:{type:'viewSale',sid:parseInt(el.dataset.vs)}}));
  document.querySelectorAll('[data-pr]').forEach(el=>el.onclick=()=>{
    const s=DB.sales.find(x=>x.id===parseInt(el.dataset.pr));
    if(s)set({modal:{type:'receipt',sale:s,change:0}});
  });

  // Products
  $('prodSearch')?.addEventListener('input',e=>set({searchTerm:e.target.value}));
  $('pCatF')?.addEventListener('change',e=>set({prodCatFilter:parseInt(e.target.value)}));
  $('addProdBtn')?.addEventListener('click',()=>set({modal:{type:'addProd'}}));
  document.querySelectorAll('[data-ep]').forEach(el=>el.onclick=()=>set({modal:{type:'editProd',pid:parseInt(el.dataset.ep)}}));
  document.querySelectorAll('[data-dp]').forEach(el=>el.onclick=()=>{
    if(confirm('Delete this product?')){const i=DB.products.findIndex(p=>p.id===parseInt(el.dataset.dp));if(i>=0){DB.products.splice(i,1);render();notify('Product deleted');}}
  });
  $('saveProdBtn')?.addEventListener('click',()=>{
    const n=$('pN').value.trim(), b=parseFloat($('pB').value), sp=parseFloat($('pSP').value);
    if(!n||isNaN(b)||isNaN(sp)){notify('Name, buy & sell price required','danger');return;}
    const d={name:n,sku:$('pS').value,category:parseInt($('pC').value)||1,emoji:$('pE').value||'🛍️',buyPrice:b,sellPrice:sp,stock:parseInt($('pST').value)||0,minStock:parseInt($('pMS').value)||10,barcode:$('pBC').value,active:true};
    if(S.modal.type==='editProd'){Object.assign(DB.products.find(p=>p.id===S.modal.pid),d);notify('Product updated!');}
    else{d.id=DB.products.length+1;DB.products.push(d);notify('Product added!');}
    set({modal:null});
  });

  // Inventory
  $('stockAdjBtn')?.addEventListener('click',()=>set({modal:{type:'stockAdj',pid:DB.products[0]?.id}}));
  document.querySelectorAll('[data-as]').forEach(el=>el.onclick=()=>set({modal:{type:'stockAdj',pid:parseInt(el.dataset.as)}}));
  $('saveStockBtn')?.addEventListener('click',()=>{
    const p=DB.products.find(x=>x.id===S.modal.pid), q=parseInt($('aQ').value)||0;
    if(!p)return;
    const t=$('aT').value;
    if(t==='add')p.stock+=q; else if(t==='remove')p.stock=Math.max(0,p.stock-q); else p.stock=q;
    notify(`Stock updated: ${p.name} → ${p.stock} units`);
    set({modal:null});
  });

  // Suppliers
  $('addSupBtn')?.addEventListener('click',()=>set({modal:{type:'addSup'}}));
  $('saveSupBtn')?.addEventListener('click',()=>{
    const n=$('sN').value.trim();if(!n){notify('Company name required','danger');return;}
    DB.suppliers.push({id:DB.suppliers.length+1,name:n,contact:$('sC').value,phone:$('sP').value,email:$('sE').value,category:$('sCat').value,active:true});
    set({modal:null});notify('Supplier added!');
  });

  // Customers
  $('custSearch')?.addEventListener('input',e=>set({customerSearch:e.target.value}));
  $('addCustBtn')?.addEventListener('click',()=>set({modal:{type:'addCust'}}));
  $('saveCustBtn')?.addEventListener('click',()=>{
    const n=$('cN').value.trim(), p=$('cP').value.trim();
    if(!n||!p){notify('Name and phone required','danger');return;}
    DB.customers.push({id:DB.customers.length+1,name:n,phone:p.replace(/^0/,'254'),email:$('cE').value,points:0,balance:0,totalSpent:0,transactions:0,joined:new Date().toISOString().split('T')[0]});
    set({modal:null});notify('Customer added!');
  });

  // Employees
  $('addEmpBtn')?.addEventListener('click',()=>set({modal:{type:'addEmp'}}));
  $('saveEmpBtn')?.addEventListener('click',()=>{
    const n=$('eN').value.trim(), pin=$('ePin').value;
    if(!n||!pin){notify('Name and PIN required','danger');return;}
    DB.users.push({id:DB.users.length+1,name:n,email:$('eE').value,role:$('eR').value,pin,active:true,created:new Date().toISOString().split('T')[0]});
    set({modal:null});notify('Employee added!');
  });

  // Settings
  $('saveSetBtn')?.addEventListener('click',()=>{
    DB.settings.storeName=$('ssN').value;DB.settings.storeAddress=$('ssA').value;
    DB.settings.phone=$('ssP').value;DB.settings.branch=$('ssB').value;
    DB.settings.taxRate=parseFloat($('ssT').value)||16;
    notify('Settings saved!');
  });
  $('saveMpBtn')?.addEventListener('click',()=>{
    MPESA_CONFIG.environment=$('mpEnv').value;
    MPESA_CONFIG.shortcode=$('mpSC').value;
    MPESA_CONFIG.callbackURL=$('mpCB').value;
    notify('M-Pesa config saved!');
  });
}

render();
</script>
